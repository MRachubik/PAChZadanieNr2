name: Zadanie 2 - Pipeline CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci_step:
    name: Build, tag and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      # pobranie repozytorium
      - name: Check out the source_repo
        uses: actions/checkout@v6

      # logowanie do rejestru GitHub (ghcr.io)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      # logowanie do DockerHub
      - 
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # definicja metadanych
      - 
        name: Docker metadata definitions
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=true
          tags: |
            type=sha,priority=100,prefix=sha-,format=short
            type=semver,priority=200,pattern={{version}}

      # konfiguracja środowiska Buildkit
      - 
        name: QEMU set-up
        uses: docker/setup-qemu-action@v4

      - 
        name: Buildx set-up
        uses: docker/setup-buildx-action@v4

      # budowanie lokalne pod testy CVE
      - 
        name: Build local image CVE test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local_test_image:latest
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/lab_pogoda:cache
      
      - 
        name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local_test_image:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      
      - 
        name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/lab_pogoda:cache 
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/lab_pogoda:cache,mode=max  
          tags: ${{ steps.meta.outputs.tags }}
